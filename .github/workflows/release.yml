name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-upload:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: thronglets-mcp-linux-amd64
            binary: target/release/thronglets
          - runner: macos-14
            asset: thronglets-mcp-darwin-arm64
            binary: target/release/thronglets
          - runner: windows-latest
            asset: thronglets-mcp-windows-amd64.exe
            binary: target/release/thronglets.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate tag matches Cargo version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          test "$TAG" = "$VERSION"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package assets (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.binary }}" "release/${{ matrix.asset }}"
          chmod +x "release/${{ matrix.asset }}"
          shasum -a 256 "release/${{ matrix.asset }}" > "release/${{ matrix.asset }}.sha256"

      - name: Package assets (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.binary }}" "release/${{ matrix.asset }}"
          $hash = (Get-FileHash "release/${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -FilePath "release/${{ matrix.asset }}.sha256" -Encoding ascii -NoNewline

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/${{ matrix.asset }}
            release/${{ matrix.asset }}.sha256
